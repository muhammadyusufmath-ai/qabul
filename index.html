<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMOLOT AKADEMIYASI - Qabul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            /* Zamonaviy gradient fon */
            background: linear-gradient(135deg, #1e3a8a 0%, #4338ca 50%, #312e81 100%);
            background-attachment: fixed;
        }
        /* Shisha effekti (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Inputlar dizayni */
        .premium-input {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .premium-input:focus {
            background-color: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-10">

    <div class="max-w-3xl w-full glass-card rounded-2xl p-8 md:p-10 relative overflow-hidden">
        
        <!-- Orqa fondagi chiroyli shakllar (dekoratsiya) -->
        <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-indigo-100 opacity-50 blur-2xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-40 h-40 rounded-full bg-blue-100 opacity-50 blur-2xl pointer-events-none"></div>

        <div class="text-center mb-10 relative z-10">
            <div class="inline-block bg-indigo-100 text-indigo-700 font-semibold px-4 py-1 rounded-full text-sm mb-4 tracking-wider">
                QABUL - 2026-2027
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-3 tracking-tight">KAMOLOT AKADEMIYASI</h1>
            <p class="text-gray-500 text-lg">Maktabimizga ro'yxatdan o'tish uchun quyidagi so'rovnomani to'ldiring</p>
        </div>

        <form id="kamolotForm" class="space-y-7 relative z-10">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">O'quvchi ismi <span class="text-red-500">*</span></label>
                    <input type="text" id="ism" required placeholder="Ismni kiriting" class="premium-input w-full p-3.5 rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">O'quvchi familiyasi <span class="text-red-500">*</span></label>
                    <input type="text" id="familiya" required placeholder="Familiyani kiriting" class="premium-input w-full p-3.5 rounded-xl">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Tug'ilgan sanasi <span class="text-red-500">*</span></label>
                    <input type="date" id="tugilgan_sana" required class="premium-input w-full p-3.5 rounded-xl text-gray-700">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Nechanchi sinf <span class="text-red-500">*</span></label>
                    <select id="sinf" required class="premium-input w-full p-3.5 rounded-xl text-gray-700">
                        <option value="" disabled selected>Sinfni tanlang...</option>
                        <option value="1-sinf">1-sinf</option>
                        <option value="2-sinf">2-sinf</option>
                        <option value="3-sinf">3-sinf</option>
                        <option value="4-sinf">4-sinf</option>
                        <option value="5-sinf">5-sinf</option>
                        <option value="6-sinf">6-sinf</option>
                        <option value="7-sinf">7-sinf</option>
                        <option value="8-sinf">8-sinf</option>
                        <option value="9-sinf">9-sinf</option>
                        <option value="10-sinf">10-sinf</option>
                        <option value="11-sinf">11-sinf</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Yashash manzili <span class="text-red-500">*</span></label>
                <input type="text" id="manzil" required placeholder="Viloyat, tuman, mahalla..." class="premium-input w-full p-3.5 rounded-xl">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Asosiy telefon raqami <span class="text-red-500">*</span></label>
                    <!-- inputmode="numeric" telefonda faqat raqamlar klaviaturasi chiqishini ta'minlaydi -->
                    <input type="tel" id="tel1" required inputmode="numeric" placeholder="+998 00 000 00 00" class="premium-input w-full p-3.5 rounded-xl font-medium tracking-wide">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Qo'shimcha telefon raqami</label>
                    <input type="tel" id="tel2" inputmode="numeric" placeholder="+998 00 000 00 00" class="premium-input w-full p-3.5 rounded-xl font-medium tracking-wide">
                </div>
            </div>

            <!-- Ixtiyoriy qo'shimcha so'rovlar -->
            <div class="border-t border-gray-100 pt-6 mt-8">
                <h3 class="text-xl font-bold text-gray-800 mb-5 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Qo'shimcha ma'lumotlar <span class="text-sm font-normal text-gray-400 ml-2">(Ixtiyoriy)</span>
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Qiziqqan yo'nalishlari</label>
                        <select id="yonalish" class="premium-input w-full p-3.5 rounded-xl text-gray-700">
                            <option value="">Tanlang...</option>
                            <option value="Matematika">Matematika</option>
                            <option value="IT va Dasturlash">IT va Dasturlash</option>
                            <option value="Xorijiy tillar">Xorijiy tillar</option>
                            <option value="Tabiiy fanlar">Tabiiy fanlar</option>
                        </select>
                    </div>
                    <div>
                        <div class="mb-2.5">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Ota-ona yoki qarindoshi</label>
                            <div class="flex space-x-5">
                                <label class="inline-flex items-center cursor-pointer">
                                    <input type="radio" name="qarindosh" value="Otasi" class="text-indigo-600 w-4 h-4 focus:ring-indigo-500" checked>
                                    <span class="ml-2 text-sm text-gray-700 font-medium">Otasi</span>
                                </label>
                                <label class="inline-flex items-center cursor-pointer">
                                    <input type="radio" name="qarindosh" value="Onasi" class="text-indigo-600 w-4 h-4 focus:ring-indigo-500">
                                    <span class="ml-2 text-sm text-gray-700 font-medium">Onasi</span>
                                </label>
                                <label class="inline-flex items-center cursor-pointer">
                                    <input type="radio" name="qarindosh" value="Boshqa qarindoshi" class="text-indigo-600 w-4 h-4 focus:ring-indigo-500">
                                    <span class="ml-2 text-sm text-gray-700 font-medium">Boshqa</span>
                                </label>
                            </div>
                        </div>
                        <input type="text" id="ota_ona" placeholder="F.I.Sh ni kiriting" class="premium-input w-full p-3.5 rounded-xl">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Biz haqimizda qayerdan bildingiz?</label>
                        <select id="manba" class="premium-input w-full p-3.5 rounded-xl text-gray-700">
                            <option value="">Tanlang...</option>
                            <option value="Telefon orqali">Telefon orqali</option>
                            <option value="Telegram">Telegram orqali</option>
                            <option value="Instagram">Instagram orqali</option>
                            <option value="Flyerlar">Flyerlar orqali</option>
                            <option value="Reklama bannerlari">Reklama bannerlari orqali</option>
                            <option value="Tanish-bilish">Tanish-bilish tavsiyasi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Tavsiya qilgan ustoz (qidirib tanlang)</label>
                        <input list="ustozlar_royxati" id="ustoz" class="premium-input w-full p-3.5 rounded-xl" placeholder="Ustoz ismini kiriting...">
                        <datalist id="ustozlar_royxati">
                            <option value="Muhammadjonov Muhammadyusuf">
                            <option value="Abdulazizova Gulbahor">
                            <option value="Azimova Ma'muraxon">
                            <option value="Djo'rayeva Ezozxon">
                            <option value="Husanova Dilbarxon">
                            <option value="Ibragimova Etiborxon">
                            <option value="Ibrohimov Ayubxon">
                            <option value="Ibrohimova Nozimaxon">
                            <option value="Jakbarova Dilfuzaxon">
                            <option value="Komilova Malikaxon">
                            <option value="Nabiyev Mujohid">
                            <option value="Mirfayozova Muhabbatxon">
                            <option value="Muhammadjonov Dilshodjon">
                            <option value="Nabiyev Muhammadali">
                            <option value="Nazarova Dildoraxon">
                            <option value="Nazarova Fazilatxon">
                            <option value="Nazirova O'g'ilxon">
                            <option value="Ne'matov Behruzbek">
                            <option value="Odilova Dilnoza">
                            <option value="Oltiboyev Diyorbek">
                            <option value="Po'latova Zuhraxon">
                            <option value="Rustamxonov Azimxon">
                            <option value="Shokirova Muqadasxon">
                            <option value="Sobirova Gavharoy">
                            <option value="Sohibjon">
                            <option value="Sotiboldiyeva Mukarramxon">
                            <option value="Usmonova Lilya">
                            <option value="Xolmatov Odilbek">
                            <option value="Xolmatova Rohilaxon">
                            <option value="Yo'ldashev Nodirjon">
                            <option value="Yo'ldasheva Zamiraxon">
                            <option value="Yulchiyeva Dilafruz">
                            <option value="Yuldasheva Sevinch">
                            <option value="Abdurahmonova Matlubaxon">
                        </datalist>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Qo'shimcha izoh yoki savollar</label>
                    <textarea id="qoshimcha" rows="3" class="premium-input w-full p-3.5 rounded-xl resize-none" placeholder="Fikringizni yozib qoldiring..."></textarea>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-4 flex justify-center items-center py-4 px-4 border border-transparent rounded-xl shadow-lg text-lg font-bold text-white bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 transform hover:-translate-y-0.5 transition-all duration-200">
                <svg id="loader" class="hidden animate-spin -ml-1 mr-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btnText">Arizani yuborish</span>
            </button>
        </form>
    </div>

    <!-- Muvaffaqiyatli xabar oynasi (Modal) -->
    <div id="successModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-70 backdrop-blur-sm overflow-y-auto h-full w-full flex items-center justify-center z-50 transition-opacity duration-300 opacity-0">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-md w-full mx-4 text-center transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-50 mb-6 border-4 border-green-100">
                <svg class="h-10 w-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-3xl font-extrabold text-gray-900 mb-3">Ajoyib!</h3>
            <p class="text-gray-500 mb-8 text-lg leading-relaxed">Arizangiz muvaffaqiyatli qabul qilindi. E'tiboringiz uchun rahmat. Tez orada mutaxassislarimiz siz bilan bog'lanishadi!</p>
            <button id="closeModal" class="w-full bg-gray-900 text-white rounded-xl px-4 py-3.5 font-bold text-lg hover:bg-gray-800 transform hover:-translate-y-0.5 transition-all duration-200">Tushunarli</button>
        </div>
    </div>

    <script>
        // SHU YERGA O'ZINGIZNING YANGI GOOGLE APPS SCRIPT SILKANGIZNI QO'YING!
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzwd4t4jpU5hpX76Ar4BbolWqk1a9z2g03zhAMbm4XG-RHvddYYRrtNlWARrEd6rDjl/exec"; 

        // ========= TELEFON RAQAM UCHUN MAXSUS MASKA LOGIKASI =========
        function formatPhoneNumber(input) {
            // Faqat raqamlarni olib qolamiz
            let val = input.value.replace(/\D/g, ''); 
            
            // Agar bosh bo'lsa yoki 998 dan boshlanmasa, 998 ni qo'shamiz
            if (val.length > 0 && !val.startsWith('998')) {
                val = '998' + val;
            }
            
            // Umumiy uzunlikni cheklaymiz (998 + 9 ta raqam = 12 ta)
            val = val.substring(0, 12);

            let formatted = '';
            if (val.length > 0) {
                formatted = '+' + val.substring(0, 3); // +998
            }
            if (val.length > 3) {
                formatted += ' ' + val.substring(3, 5); // 77
            }
            if (val.length > 5) {
                formatted += ' ' + val.substring(5, 8); // 004
            }
            if (val.length > 8) {
                formatted += ' ' + val.substring(8, 10); // 02
            }
            if (val.length > 10) {
                formatted += ' ' + val.substring(10, 12); // 04
            }

            input.value = formatted;
        }

        const telInputs = document.querySelectorAll('input[type="tel"]');
        telInputs.forEach(input => {
            input.addEventListener('input', function(e) {
                formatPhoneNumber(this);
            });
            input.addEventListener('focus', function() {
                if (this.value === '') {
                    this.value = '+998 ';
                }
            });
            // Backspace bosilganda agar faqat +998 qolsa, o'chib ketishiga yo'l qo'ymaslik
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length <= 6) {
                    e.preventDefault();
                }
            });
        });
        // ==============================================================

        // O'ZBEKCHA XATO XABARLARI
        const requiredInputs = document.querySelectorAll('[required]');
        requiredInputs.forEach(input => {
            input.addEventListener('invalid', function(e) {
                e.preventDefault(); 
                this.setCustomValidity("Iltimos, belgilangan joyni to'ldiring!");
                this.reportValidity(); 
            });
            input.addEventListener('input', function() {
                this.setCustomValidity('');
            });
        });

        // FORMANI YUBORISH LOGIKASI
        const form = document.getElementById('kamolotForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        
        const modal = document.getElementById('successModal');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Telefon raqami to'liq kiritilganini tekshirish (17ta belgi: +998 77 004 02 04)
            const tel1Val = document.getElementById('tel1').value;
            if (tel1Val.length < 17) {
                const tel1El = document.getElementById('tel1');
                tel1El.setCustomValidity("Telefon raqamni to'liq kiriting!");
                tel1El.reportValidity();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.innerText = "Yuborilmoqda...";
            loader.classList.remove('hidden');

            let rawDate = document.getElementById('tugilgan_sana').value;
            let formattedDate = "";
            if(rawDate) {
                let parts = rawDate.split('-'); 
                formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
            }

            let selectedQarindosh = document.querySelector('input[name="qarindosh"]:checked').value;

            const formData = new URLSearchParams();
            formData.append('ism', document.getElementById('ism').value);
            formData.append('familiya', document.getElementById('familiya').value);
            formData.append('tugilgan_sana', formattedDate);
            formData.append('manzil', document.getElementById('manzil').value);
            formData.append('sinf', document.getElementById('sinf').value);
            formData.append('yonalish', document.getElementById('yonalish').value);
            formData.append('tel1', document.getElementById('tel1').value);
            formData.append('tel2', document.getElementById('tel2').value);
            formData.append('qarindosh', selectedQarindosh);
            formData.append('ota_ona', document.getElementById('ota_ona').value);
            formData.append('manba', document.getElementById('manba').value);
            formData.append('ustoz', document.getElementById('ustoz').value);
            formData.append('qoshimcha', document.getElementById('qoshimcha').value);

            fetch(webAppUrl, {
                method: 'POST',
                body: formData,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    form.reset();
                    showModal(); 
                } else {
                    alert("Kechirasiz, xatolik yuz berdi: " + data.message);
                }
            })
            .catch(error => {
                alert("Internetda uzilish bo'ldi. Iltimos qayta urinib ko'ring.");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.innerText = "Arizani yuborish";
                loader.classList.add('hidden');
            });
        });

        function showModal() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function hideModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        closeModal.addEventListener('click', hideModal);
    </script>
</body>
</html>
